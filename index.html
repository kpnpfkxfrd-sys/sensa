<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PUBG Sens Shop</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin: 10px auto;
      max-width: 400px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: white;
    }

    .buy {
      background: #22c55e;
    }

    .discount {
      background: #3b82f6;
    }

    .back {
      background: #334155;
    }
  </style>
</head>

<body>

<h2>🔥 PUBG Sens Shop</h2>

<div class="card">
  <p>Выбери вариант покупки</p>

  <button class="buy" onclick="buy('full')">
    Купить — 1000₽
  </button>

  <button class="discount" onclick="buy('discount')">
    С другом -10% → 900₽
  </button>

  <button class="back" onclick="closeApp()">
    ⏪ Назад
  </button>
</div>

<script>
  function init() {
    const tg = window.Telegram?.WebApp;

    if (!tg) return;

    tg.ready();
    tg.expand();

    window.buy = function(type) {
      tg.sendData(type);
    };

    window.closeApp = function() {
      tg.close();
    };
  }

  if (document.readyState === "complete") {
    init();
  } else {
    window.addEventListener("load", init);
  }
</script>

</body>
</html>
