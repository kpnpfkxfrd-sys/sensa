<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PUBG Shop</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border-radius: 10px;
      border: 0;
      font-size: 16px;
      cursor: pointer;
      color: white;
    }

    .buy { background: #22c55e; }
    .discount { background: #3b82f6; }
    .back { background: #334155; }
  </style>
</head>

<body>

<h2>🔥 PUBG Sens Shop</h2>

<div class="card">
  <p>Выбери вариант</p>

  <button class="buy" onclick="buy('full')">Купить — 1000₽</button>

  <button class="discount" onclick="buy('discount')">С другом -10%</button>

  <button class="back" onclick="closeApp()">Закрыть</button>
</div>

<script>
  let tg = null;

  function init() {
    try {
      tg = window.Telegram?.WebApp;

      if (tg) {
        tg.ready();
        tg.expand();
      }
    } catch (e) {
      console.log("Telegram not available");
    }
  }

  function buy(type) {
    try {
      if (tg) {
        tg.sendData(type);
      } else {
        alert("Telegram WebApp не найден");
      }
    } catch (e) {}
  }

  function closeApp() {
    try {
      if (tg) tg.close();
    } catch (e) {}
  }

  window.addEventListener("load", init);
</script>

</body>
</html>
